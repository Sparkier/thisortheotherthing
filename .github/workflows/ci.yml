name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same branch/PR when new commits are pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # Dummy Supabase values so builds/type-gen don't fail on missing public env vars.
    env:
      PUBLIC_SUPABASE_URL: http://localhost
      PUBLIC_SUPABASE_ANON_KEY: dummy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (prettier + eslint)
        run: npm run lint

      - name: Type check (svelte-check)
        run: npm run check

      - name: Unit tests
        run: npm run test:unit -- --run
